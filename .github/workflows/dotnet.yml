name: .NET CI

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      TAG_NAME: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v7

      - name: Create release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name="build_${GITHUB_RUN_NUMBER}"
          sha_short="$(git rev-parse --short HEAD)"
          release_body="This is an automated build"$'\n\n'"Build ID: ${GITHUB_RUN_NUMBER}"

          gh release create "$tag_name" \
            --title "build:${sha_short}" \
            --notes "$release_body"

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

  buildMatrix:
    name: Publish for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            asset_path: YouTubeDlpGui/bin/Release/net10.0/linux-x64/publish/YouTubeDlpGui
            asset_name: YouTubeDlpGui-linux-amd64
          - os: windows-latest
            runtime: win-x64
            asset_path: YouTubeDlpGui/bin/Release/net10.0/win-x64/publish/YouTubeDlpGui.exe
            asset_name: YouTubeDlpGui-windows-amd64.exe
          - os: macos-latest
            runtime: osx-x64
            asset_path: YouTubeDlpGui/bin/Release/net10.0/osx-x64/publish/YouTubeDlpGui
            asset_name: YouTubeDlpGui-macos-amd64

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.runtime }} -p:PublishSingleFile=true --self-contained true --verbosity normal -p:PublishTrimmed=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload executable to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.TAG_NAME }}
        run: gh release upload "$TAG_NAME" "${{ matrix.asset_path }}#${{ matrix.asset_name }}" --clobber
